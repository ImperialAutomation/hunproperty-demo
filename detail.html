  <style>
    :root {
      --bg:        oklch(0.995 0.002 80);
      --surface:   oklch(0.972 0.006 80);
      --surface-2: oklch(0.945 0.010 80);
      --line:      oklch(0.91 0.006 80);
      --line-strong: oklch(0.82 0.010 80);
      --ink:       oklch(0.22 0.025 175);
      --ink-2:     oklch(0.36 0.025 175);
      --muted:     oklch(0.52 0.012 80);
      --muted-2:   oklch(0.66 0.010 80);
      --accent:    oklch(0.58 0.12 45);
      --accent-soft: color-mix(in oklch, var(--accent) 14%, var(--bg));
      --accent-ink: oklch(0.42 0.10 45);
      --serif: "Instrument Serif", Georgia, serif;
      --sans:  "Instrument Sans", ui-sans-serif, system-ui, sans-serif;
      --mono:  "JetBrains Mono", ui-monospace, monospace;
      --radius: 6px;
      --radius-lg: 10px;
      --header-h: 56px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body { font-family: var(--sans); font-size: 15px; line-height: 1.5; color: var(--ink); background: var(--bg); -webkit-font-smoothing: antialiased; }
    button { font: inherit; color: inherit; }
    input, textarea { font: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    .mono { font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
    .serif { font-family: var(--serif); font-weight: 400; }
  </style>

  <link rel="stylesheet" href="responsive.css" />
