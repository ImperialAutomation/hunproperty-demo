<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Otthon · Hungarian Homes</title>

  <!-- ============================================================
       DESIGN NOTES — Otthon (working name for HunProperty)
       Naam: "Otthon" = Hungarian for 'home'. Short, brandable,
             easy to pronounce internationally. Alt: "Páva".
       Palette: warm off-white + deep teal-green ink + terracotta
                accent. No bright colors, no cold whites.
       Type: Instrument Serif (display) + Instrument Sans (body)
             + JetBrains Mono (small meta labels).
       Principle: ZOEKEN STAAT CENTRAAL. Header is compact,
                  search bar is the largest element, map sits
                  beside it. No oversized hero.
       ============================================================ -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Leaflet for the real map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      /* Surfaces — pure white, very subtle warmth */
      --bg:        oklch(0.995 0.002 80);     /* near-white paper */
      --surface:   oklch(0.972 0.006 80);     /* faint cream wash */
      --surface-2: oklch(0.945 0.010 80);     /* secondary cream */
      --line:      oklch(0.91 0.006 80);      /* hairline */
      --line-strong: oklch(0.82 0.010 80);

      /* Ink */
      --ink:       oklch(0.22 0.025 175);     /* deep teal-near-black */
      --ink-2:     oklch(0.36 0.025 175);
      --muted:     oklch(0.52 0.012 80);
      --muted-2:   oklch(0.66 0.010 80);

      /* Accent — overridden by Tweak */
      --accent:    oklch(0.58 0.12 45);       /* terracotta default */
      --accent-soft: color-mix(in oklch, var(--accent) 14%, var(--bg));
      --accent-ink: oklch(0.42 0.10 45);

      /* Type */
      --serif: "Instrument Serif", "Cormorant Garamond", Georgia, serif;
      --sans:  "Instrument Sans", ui-sans-serif, system-ui, sans-serif;
      --mono:  "JetBrains Mono", ui-monospace, monospace;

      /* Layout */
      --radius: 6px;
      --radius-lg: 10px;
      --header-h: 56px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.5;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button { font: inherit; color: inherit; }
    input { font: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }

    /* Utility */
    .mono { font-family: var(--mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); }
    .serif { font-family: var(--serif); font-weight: 400; }
    .hairline { border: 1px solid var(--line); }
  </style>

  <link rel="stylesheet" href="responsive.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script src="image-slot.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="map.jsx"></script>
  <script type="text/babel" src="leaflet-map.jsx"></script>

  <script type="text/babel" src="cards.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
